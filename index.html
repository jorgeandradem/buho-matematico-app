<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    
    <link rel="apple-touch-icon" href="/pwa-icon.png">
    <link rel="manifest" href="/manifest.json">
    
    <meta name="theme-color" content="#4f46e5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Búho Matemático</title>
    
    <link rel="preload" href="/src/assets/fonts/Inter-VariableFont_opsz,wght.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
      /* BLINDAJE TOTAL DISPOSITIVOS TÁCTILES */
      html, body {
        /* Evita el scroll y el rebote (Goma elástica) */
        overscroll-behavior-y: contain;
        overscroll-behavior-x: none;
        overflow: hidden !important;
        
        /* Fija el tamaño absoluto para evitar desplazamientos por teclado */
        width: 100% ;
        height: 100% ;
        position: fixed;
        
        /* Desactiva selección de texto y menús contextuales */
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        user-select: none;
        
        /* DESACTIVA GESTOS DEL NAVEGADOR (Zoom y Pan) */
        /* Importante: !important asegura que nadie lo sobreescriba */
        touch-action: none !important;
        -ms-touch-action: none !important;
        
        background-color: #ffffff;
        margin: 0;
        padding: 0;
      }

      #app {
        width: 100%;
        height: 100%;
        /* Refuerzo para el contenedor de Vue */
        touch-action: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
