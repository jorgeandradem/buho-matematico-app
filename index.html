<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png">
    
    <link rel="manifest" href="/manifest.webmanifest">
    
    <meta name="theme-color" content="#4f46e5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Búho Matemático - Dimensión Cuántica</title> 
    <link rel="preload" href="/src/assets/fonts/Inter-VariableFont_opsz,wght.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/videos/buhonav.mp4" as="video" type="video/mp4">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/src/css/CrystalDimension.css">

    <style>
      /* 🛡️ BLINDAJE TOTAL DISPOSITIVOS TÁCTILES v2.11.5 */
      html, body {
        overscroll-behavior-y: contain;
        overscroll-behavior-x: none;
        overflow: hidden !important;
        
        width: 100vw;
        height: 100dvh; 
        position: fixed;
        top: 0;
        left: 0;
        
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        user-select: none;
        
        /* Bloqueo estricto de gestos nativos del navegador en la raíz */
        touch-action: none !important;
        -ms-touch-action: none !important;
        
        background-color: #050b14; 
        margin: 0;
        padding: 0;
      }

      #app {
        width: 100%;
        height: 100dvh;
        /* 🚀 CAMBIO QUIRÚRGICO: Cambiamos 'none' por 'manipulation' o 'auto'.
           Esto permite que los botones dentro de los juegos reciban eventos táctiles 
           sin delay, pero el 'html' de arriba sigue impidiendo el scroll de la página. */
        touch-action: auto !important; 
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
